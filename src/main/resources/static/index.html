<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workload Planner</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header id="app-header">
    <div class="header-left">
      <span class="app-title">Workload Planner</span>
      <div class="header-actions">
        <label class="btn" for="csv-file-input">Import CSV</label>
        <input type="file" id="csv-file-input" accept=".csv" hidden>

        <label class="btn" for="csv-merge-input">Merge CSV</label>
        <input type="file" id="csv-merge-input" accept=".csv" hidden>

        <button id="btn-import-json" class="btn">Import plan</button>
        <input type="file" id="json-file-input" accept=".json" hidden>

        <button id="btn-export" class="btn">Export plan</button>
      </div>
    </div>

    <div class="header-center">
      <div class="toggle-group" id="view-toggle">
        <button class="toggle active" data-view="resource">Resource</button>
        <button class="toggle" data-view="task">Task</button>
      </div>
      <div class="toggle-group" id="zoom-toggle">
        <button class="toggle active" data-zoom="day">Day</button>
        <button class="toggle" data-zoom="week">Week</button>
      </div>
    </div>

    <div class="header-right"></div>
  </header>

  <div id="app-body">
    <div id="timeline-container">
      <div id="timeline-header"></div>
      <div id="timeline-body"></div>
    </div>
    <aside id="side-panel" class="hidden">
      <button id="side-panel-close">&times;</button>
      <div id="side-panel-content"></div>
    </aside>
  </div>

  <div id="error-banner" class="hidden"></div>
  <div id="tooltip" class="tooltip hidden"></div>

  <div id="delete-alloc-dialog" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-title">Delete allocation?</div>
      <div class="modal-body" id="delete-alloc-body"></div>
      <div class="modal-actions">
        <button id="btn-delete-alloc-confirm" class="btn-modal btn-modal--danger">Delete</button>
        <button id="btn-delete-alloc-cancel" class="btn-modal btn-modal--export">Cancel</button>
      </div>
    </div>
  </div>

  <div id="edit-alloc-dialog" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal" style="min-width:320px">
      <div class="modal-title" id="edit-dialog-title">Edit</div>
      <div class="modal-body" id="edit-dialog-body" style="padding-top:0"></div>
      <div class="modal-actions">
        <button id="btn-edit-confirm" class="btn-modal btn-modal--save">Save</button>
        <button id="btn-edit-cancel" class="btn-modal btn-modal--export">Cancel</button>
      </div>
    </div>
  </div>

  <div id="reload-dialog" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-title">Reload page?</div>
      <div class="modal-body">All updates will be lost after the reload. Should we export the results first?</div>
      <div class="modal-actions">
        <button id="btn-dialog-export" class="btn-modal btn-modal--export">Export plan</button>
        <button id="btn-dialog-reload" class="btn-modal btn-modal--reload">Reload</button>
      </div>
    </div>
  </div>

  <script src="/js/state.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/tooltip.js"></script>
  <script src="/js/sidepanel.js"></script>
  <script src="/js/dragdrop.js"></script>
  <script src="/js/timeline.js"></script>
  <script src="/js/import-export.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
